<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ចូលប្រើប្រាស់ប្រព័ន្ធ - HUOKAING THARA INTERNATIONAL SCHOOL</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="login-style.css">
</head>
<body class="bg-blue-950 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 md:p-8 relative overflow-hidden">
        <!-- Decorative Header Accent -->
        <div class="absolute top-0 left-0 w-full h-2 bg-amber-400"></div>

        <!-- School Brand Identity -->
        <div class="text-center mb-6">
            <img src="school_logo.jpg" alt="School Logo" class="h-16 w-auto mx-auto object-contain rounded-full border-2 border-amber-400 mb-2">
            <h2 class="text-xl md:text-2xl font-bold text-blue-950">ចូលប្រើប្រាស់ប្រព័ន្ធ</h2>
            <p class="text-xs text-gray-500 mt-1">សូមបំពេញអ៊ីមែល និងលេខកូដសម្ងាត់របស់អ្នក</p>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-4">
            <!-- Email Input -->
            <div>
                <label for="email" class="block text-sm font-semibold text-gray-700 mb-1">អាសយដ្ឋានអ៊ីមែល (Email)</label>
                <input type="email" id="email" name="email" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-950 focus:border-transparent outline-none transition text-gray-800"
                    placeholder="example@gmail.com">
            </div>

            <!-- Password Input -->
            <div>
                <div class="flex justify-between items-center mb-1">
                    <label for="password" class="block text-sm font-semibold text-gray-700">លេខកូដសម្ងាត់ (Password)</label>
                    <a href="#" class="text-xs text-blue-950 hover:text-amber-500 transition">ភ្លេចលេខកូដសម្ងាត់?</a>
                </div>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-950 focus:border-transparent outline-none transition text-gray-800"
                    placeholder="បញ្ចូលលេខកូដសម្ងាត់">
            </div>

            <!-- Remember Me Checked State -->
            <div class="flex items-center">
                <input type="checkbox" id="rememberMe" class="h-4 w-4 text-blue-950 focus:ring-blue-950 border-gray-300 rounded">
                <label for="rememberMe" class="ml-2 block text-xs text-gray-600 select-none">ចងចាំគណនីរបស់ខ្ញុំ</label>
            </div>

            <!-- Custom Error/Success Alerts Area -->
            <div id="formAlert" class="hidden text-sm p-3 rounded-lg text-center font-medium"></div>

            <!-- Submit Button -->
            <button type="submit" 
                class="w-full bg-amber-400 hover:bg-amber-500 text-blue-950 font-bold py-2.5 px-4 rounded-lg transition duration-200 shadow-md transform hover:-translate-y-0.5 active:translate-y-0">
                ចូលប្រើប្រាស់ឥឡូវនេះ
            </button>
        </form>

        <!-- Footer Redirection Link -->
        <div class="mt-6 pt-4 border-t border-gray-100 text-center text-sm text-gray-600">
            មិនទាន់មានគណនីមែនទេ? 
            <a href="https://tharahuokaing.github.io/school_register/" class="text-blue-950 font-bold hover:text-amber-500 underline transition ml-1">ចុះឈ្មោះនៅទីនេះ</a>
        </div>
    </div>

    <!-- JavaScript Link -->
    <script src="login-script.js"></script>
</body>
</html>
